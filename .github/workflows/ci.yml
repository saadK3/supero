name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "phase-*"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_discovery
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d job_discovery"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/job_discovery
      REDIS_URL: redis://localhost:6379/0
      APP_NAME: Job Discovery SaaS API
      ENVIRONMENT: test
      API_V1_PREFIX: /api/v1
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest

